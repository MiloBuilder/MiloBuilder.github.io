<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Road 3</title>

<link rel="stylesheet" href="game.css">

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  #unity-container {
    width: 100vw;
    height: 100vh;
  }

  canvas {
    width: 100%;
    height: 100%;
  }
</style>
</head>

<body>

<div id="unity-container">
  <canvas id="unity-canvas"></canvas>
</div>

<script>
  const buildUrl = "Build";

  const config = {
    dataUrl: buildUrl + "/escape-road-3.data",        // 🔗 YOU CHANGE THIS
    frameworkUrl: buildUrl + "/escape-road-3.framework.js",
    codeUrl: buildUrl + "/escape-road-3.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "ozgames.io",
    productName: "Escape Road 3",
    productVersion: "1.0"
  };

  const canvas = document.querySelector("#unity-canvas");

  const script = document.createElement("script");
  script.src = buildUrl + "/escape-road-3.loader.js";

  script.onload = () => {
    createUnityInstance(canvas, config)
      .then((unityInstance) => {
        window.unityInstance = unityInstance;
      })
      .catch((err) => {
        alert(err);
      });
  };

  document.body.appendChild(script);
</script>

</body>
</html>
