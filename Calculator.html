<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cool Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    height:100vh;
    overflow:hidden;
}

/* ⭐ STAR BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    transition:transform 0.15s ease;
}

/* 🧮 CALCULATOR WINDOW */
.calc{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);

    width:260px;
    padding:15px;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* DISPLAY */
#display{
    width:100%;
    height:50px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    padding:10px;
    font-size:18px;

    background:rgba(0,0,0,0.5);
    color:white;
}

/* BUTTON GRID */
.calc-buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.calc-buttons button{
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:14px;
}

.calc-buttons button:hover{
    background:rgba(255,255,255,0.2);
}

/* LEFT BUTTON TOWER */
.button-window{
    position:absolute;
    left:40px;
    top:50%;
    transform:translateY(-50%);

    padding:14px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.08);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ICON STYLE */
.btn img{
    width:60%;
    filter: grayscale(1) brightness(1.6);
}

.btn:hover{
    transform:scale(1.1);
    background:rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- 🧮 CALCULATOR -->
<div class="calc">
    <input id="display" readonly>

    <div class="calc-buttons">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('/')">/</button>

        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('*')">*</button>

        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('-')">-</button>

        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="press('+')">+</button>

        <button onclick="clearDisplay()" style="grid-column: span 4;">C</button>
    </div>
</div>

<!-- 🔘 LEFT BUTTON TOWER -->
<div class="button-window">
    <div class="buttons">
        <button class="btn" onclick="goPage('page1.html')">
            <img src="icon1.png">
        </button>

        <button class="btn" onclick="goPage('page2.html')">
            <img src="icon2.png">
        </button>

        <button class="btn">
            <img src="icon3.png">
        </button>
    </div>
</div>

<script>
/* ⭐ STARS */
const bg = document.getElementById("bg");
const stars = [];

for(let i=0;i<120;i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    bg.appendChild(s);
    stars.push(s);
}

/* ⭐ MOUSE PARALLAX */
document.addEventListener("mousemove",(e)=>{
    let x = (e.clientX/window.innerWidth - 0.5)*25;
    let y = (e.clientY/window.innerHeight - 0.5)*25;

    stars.forEach((s,i)=>{
        s.style.transform = `translate(${x*(i%3)}px, ${y*(i%3)}px)`;
    });
});

/* 🧮 CALCULATOR LOGIC */
let display = document.getElementById("display");

function press(val){
    display.value += val;
}

function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "error";
    }
}

function clearDisplay(){
    display.value = "";
}

/* 🔗 PAGE REDIRECT */
function goPage(page){
    window.location.href = page;
}
</script>

</body>
</html>
