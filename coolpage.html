<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cool Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ⭐ BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
}

/* ⭐ MAIN CONTAINER */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

/* 🌫️ GLASS BOX */
.glass{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* TOP BIG BOX */
.top-box{
    width:420px;
    height:140px;
}

/* SMALL BOX BELOW */
.small-box{
    width:280px;
    height:70px;
}

/* 🎮 BUTTON ROW */
.buttons{
    display:flex;
    gap:18px;
    margin-top:10px;
}

/* BUTTON STYLE */
.btn{
    width:55px;
    height:55px;
    border-radius:16px;
    border:none;
    cursor:pointer;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.2s;
}

/* SOFT ICON COLOR */
.btn img{
    width:60%;
    height:60%;
    object-fit:contain;

    filter: grayscale(1) brightness(1.8) opacity(0.8);
}

/* HOVER */
.btn:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.08);
}

.btn:hover img{
    filter: grayscale(0) brightness(1.2) opacity(1);
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="container">

    <!-- 🔲 TOP TEXT BOX -->
    <div class="glass top-box"></div>

    <!-- 🔘 BUTTONS -->
    <div class="buttons">
        <button class="btn"><img src="icon1.png"></button>
        <button class="btn"><img src="icon2.png"></button>
        <button class="btn"><img src="icon3.png"></button>
    </div>

    <!-- 🔲 SMALL BOX -->
    <div class="glass small-box"></div>

</div>

</body>
</html>
