<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cool Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    color:white;
    height:100vh;
    overflow:hidden;
}

/* ⭐ BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    height:100%;
    width:80px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border-right:1px solid rgba(255,255,255,0.08);
}

/* BUTTONS */
.side-btn{
    width:50px;
    height:50px;

    border-radius:14px;
    border:none;
    cursor:pointer;

    background:rgba(255,255,255,0.08);
    transition:0.2s;

    display:flex;
    align-items:center;
    justify-content:center;
}

.side-btn:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.05);
}

/* IMAGE INSIDE BUTTON */
.side-btn img{
    width:60%;
    height:60%;
    object-fit:contain;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- LEFT SIDEBAR -->
<div class="sidebar">
    <button class="side-btn">
        <img src="icon1.png">
    </button>

    <button class="side-btn">
        <img src="icon2.png">
    </button>

    <button class="side-btn">
        <img src="icon3.png">
    </button>
</div>

<script>
/* ⭐ STARS */
const bg=document.getElementById("bg");

for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    bg.appendChild(s);
}
</script>

</body>
</html>
