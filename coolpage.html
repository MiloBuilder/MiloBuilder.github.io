<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cool Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    height:100vh;
    overflow:hidden;
}

/* ⭐ STAR BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
}

/* ⭐ LEFT FLOATING WINDOW */
.container{
    position:absolute;
    left:60px;
    top:50%;
    transform:translateY(-50%);

    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:15px;
}

/* 🌫️ GLASS BOX */
.glass{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* SMALLER TOP BOX */
.top-box{
    width:260px;
    height:90px;
}

/* BUTTON ROW */
.buttons{
    display:flex;
    gap:12px;
}

/* BUTTON STYLE */
.btn{
    width:50px;
    height:50px;
    border-radius:14px;
    border:none;
    cursor:pointer;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.2s;
}

/* ICON */
.btn img{
    width:60%;
    height:60%;
    object-fit:contain;
    filter: grayscale(1) brightness(1.8) opacity(0.8);
}

.btn:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.08);
}

/* SMALL BOTTOM BOX */
.small-box{
    width:200px;
    height:60px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="container">

    <div class="glass top-box"></div>

    <div class="buttons">
        <button class="btn"><img src="icon1.png"></button>
        <button class="btn"><img src="icon2.png"></button>
        <button class="btn"><img src="icon3.png"></button>
    </div>

    <div class="glass small-box"></div>

</div>

<script>
/* ⭐ STARS */
const bg = document.getElementById("bg");
const stars = [];

for(let i=0;i<120;i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    bg.appendChild(s);
    stars.push(s);
}

/* ⭐ subtle mouse movement */
document.addEventListener("mousemove",(e)=>{
    let x = (e.clientX/window.innerWidth - 0.5)*15;
    let y = (e.clientY/window.innerHeight - 0.5)*15;

    stars.forEach((s,i)=>{
        s.style.transform = `translate(${x*(i%3)}px, ${y*(i%3)}px)`;
    });
});
</script>

</body>
</html>
