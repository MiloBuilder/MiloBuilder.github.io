<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galactic Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    height:100vh;
    overflow:hidden;
}


#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    transition:transform 0.15s ease;
}


.window{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);

    width:260px;
    height:120px;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    font-weight:600;
}

.window .title{
    font-size:20px;
    letter-spacing:2px;
}

.window .sub{
    margin-top:6px;
    font-size:12px;
    opacity:0.7;
}


.button-window{
    position:absolute;
    left:40px;
    top:50%;
    transform:translateY(-50%);

    padding:14px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
}


.btn{
    width:52px;
    height:52px;
    border-radius:14px;
    border:none;
    cursor:pointer;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.2s;
}


.btn img{
    width:60%;
    height:60%;
    object-fit:contain;

    filter: grayscale(1) brightness(1.6) contrast(0.9);
    opacity:0.9;
}

.btn:hover{
    transform:scale(1.1);
    background:rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- BIG WINDOW -->
<div class="window">
    <div class="title">Galactic Games</div>
    <div class="sub">Welcome to Galactic Games.</div>
</div>

<!-- BUTTON TOWER -->
<div class="button-window">
    <div class="buttons">
        <button class="btn"><img src="https://gcdnb.pbrd.co/images/phamHTNQsAqN.png"></button>
        <button class="btn"><img src="https://gcdnb.pbrd.co/images/Ob6Byx3zRWMY.png"></button>
        <button class="btn"><img src="https://gcdnb.pbrd.co/images/7zXQ-mJMEbEo.png"></button>
    </div>
</div>

<script>
/* ⭐ STARS */
const bg = document.getElementById("bg");
const stars = [];

for(let i=0;i<120;i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    bg.appendChild(s);
    stars.push(s);
}

/* ⭐ MOUSE FOLLOW EFFECT */
document.addEventListener("mousemove",(e)=>{
    let x = (e.clientX/window.innerWidth - 0.5) * 25;
    let y = (e.clientY/window.innerHeight - 0.5) * 25;

    stars.forEach((s,i)=>{
        s.style.transform = `translate(${x*(i%3)}px, ${y*(i%3)}px)`;
    });
});
</script>

</body>
</html>
