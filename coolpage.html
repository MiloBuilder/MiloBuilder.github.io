<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cool Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    height:100vh;
    overflow:hidden;
}

/* ⭐ BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
}

/* ⭐ TOP-LEFT BUTTON CLUSTER */
.corner-buttons{
    position:fixed;
    top:15px;
    left:15px;

    display:flex;
    flex-direction:column;
    gap:10px;
}

/* BUTTON STYLE */
.btn{
    width:48px;
    height:48px;

    border-radius:12px;
    border:none;
    cursor:pointer;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(8px);

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.2s;
}

.btn:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.05);
}

/* IMAGE */
.btn img{
    width:60%;
    height:60%;
    object-fit:contain;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- 🔲 CORNER BUTTONS -->
<div class="corner-buttons">
    <button class="btn">
        <img src="icon1.png">
    </button>

    <button class="btn">
        <img src="icon2.png">
    </button>

    <button class="btn">
        <img src="icon3.png">
    </button>
</div>

</body>
</html>
