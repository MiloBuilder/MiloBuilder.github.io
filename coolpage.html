<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cool Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    height:100vh;
    overflow:hidden;
}

/* ⭐ STAR BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
}

/* CENTER LAYOUT */
.container{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}

/* BIG WINDOW */
.window{
    width:260px;
    height:120px;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    font-weight:600;
}

.window .title{
    font-size:20px;
    letter-spacing:2px;
}

.window .sub{
    margin-top:6px;
    font-size:12px;
    opacity:0.7;
}

/* BUTTON WINDOW (behind buttons) */
.button-window{
    padding:12px 16px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:12px;
}

.btn{
    width:50px;
    height:50px;
    border-radius:14px;
    border:none;
    cursor:pointer;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    transition:0.2s;
}

.btn:hover{
    transform:scale(1.1);
    background:rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="container">

    <!-- BIG WINDOW -->
    <div class="window">
        <div class="title">edit</div>
        <div class="sub">OMFGHG</div>
    </div>

    <!-- BUTTON WINDOW -->
    <div class="button-window">
        <div class="buttons">
            <button class="btn"></button>
            <button class="btn"></button>
            <button class="btn"></button>
        </div>
    </div>

</div>

<script>
/* ⭐ STARS */
const bg=document.getElementById("bg");
const stars=[];

for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    bg.appendChild(s);
    stars.push(s);
}
</script>

</body>
</html>
