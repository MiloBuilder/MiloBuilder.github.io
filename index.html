<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Drive</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:ui-sans-serif,system-ui;
    background:#05060a;
    color:white;
    overflow:hidden;
}

/* BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.5;
    transition:transform 0.1s ease;
}

/* HEADER */
header{
    text-align:center;
    padding:30px;
    backdrop-filter:blur(10px);
}

h1{
    font-size:2.8rem;
    background:linear-gradient(90deg,#fff,#8b5cf6,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(139,92,246,0.4);
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

#search{
    padding:12px 16px;
    width:260px;
    border-radius:999px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

button{
    padding:10px 16px;
    border-radius:999px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
}

/* GRID */
.grid{
    height:calc(100vh - 140px);
    overflow-y:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,160px);
    justify-content:center;
    gap:24px;
    padding:40px;
}

/* PURPLE SCROLL */
.grid::-webkit-scrollbar{width:10px;}
.grid::-webkit-scrollbar-thumb{background:#8b5cf6;border-radius:10px;}

/* CARD */
.card{
    width:160px;
    height:160px;
    border-radius:16px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    background:rgba(255,255,255,0.05);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px) scale(1.04);
    box-shadow:0 10px 25px rgba(0,0,0,0.6),0 0 15px rgba(139,92,246,0.3);
}

.card img,.card video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:8px;
    background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

/* FAVORITE */
.fav{
    position:absolute;
    top:8px;
    right:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.fav.active{
    color:#facc15;
    text-shadow:0 0 10px #facc15;
    transform:scale(1.2);
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
}

.window{
    width:95%;
    height:92%;
    background:#0c0f18;
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#151a2a;
}

.close-btn{
    width:34px;
    height:34px;
    border-radius:8px;
    background:rgba(255,255,255,0.08);
    color:white;
    border:none;
    cursor:pointer;
}

.close-btn:hover{
    background:#ef4444;
}

iframe{flex:1;width:100%;border:none;}
</style>
</head>

<body>

<div id="bg"></div>

<header>
    <h1>Galactic Games</h1>
    <div class="controls">
        <input id="search" placeholder="Search games...">
        <button id="sortBtn" onclick="toggleSort()">A-Z</button>
    </div>
</header>

<div class="grid" id="grid"></div>

<div id="overlay">
    <div class="window">
        <div class="topbar">
            <div id="title">Game</div>
            <button class="close-btn" onclick="closeGame()">✕</button>
        </div>
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
let games=[];
let sort="asc";

const grid=document.getElementById("grid");
const overlay=document.getElementById("overlay");
const frame=document.getElementById("frame");
const title=document.getElementById("title");

/* FAVORITES */
function getFavs(){
    return JSON.parse(localStorage.getItem("favs"))||[];
}

function saveFavs(f){localStorage.setItem("favs",JSON.stringify(f));}

function toggleFav(e,name){
    e.stopPropagation();
    let f=getFavs();
    if(f.includes(name)) f=f.filter(x=>x!==name);
    else f.push(name);
    saveFavs(f);
    render(games);
}

/* SORT */
function toggleSort(){
    sort = sort==="asc"?"desc":"asc";
    sortBtn.innerText = sort==="asc"?"A-Z":"Z-A";

    games.sort((a,b)=>
        sort==="asc"
        ? a.name.localeCompare(b.name)
        : b.name.localeCompare(a.name)
    );

    render(games);
}

/* RENDER */
function render(list){
    grid.innerHTML="";
    let favs=getFavs();

    // favorites first
    list=[...list].sort((a,b)=>favs.includes(b.name)-favs.includes(a.name));

    list.forEach(g=>{
        let c=document.createElement("div");
        c.className="card";

        let media = g.video
            ? `<video src="${g.video}" muted loop></video>`
            : `<img src="${g.image || 'https://picsum.photos/300?random='+Math.random()}">`;

        c.innerHTML=`
            ${media}
            <div class="title">${g.name}</div>
            <div class="fav ${favs.includes(g.name)?"active":""}">★</div>
        `;

        let vid=c.querySelector("video");
        if(vid){
            c.onmouseenter=()=>vid.play();
            c.onmouseleave=()=>vid.pause();
        }

        c.onclick=()=>openGame(g);
        c.querySelector(".fav").onclick=(e)=>toggleFav(e,g.name);

        grid.appendChild(c);
    });
}

/* GAME */
function openGame(g){
    frame.src=g.url;
    title.innerText=g.name;
    overlay.style.display="flex";
}

function closeGame(){
    overlay.style.display="none";
    frame.src="";
}

/* SEARCH */
search.addEventListener("input",e=>{
    let v=e.target.value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

/* LOAD */
fetch("games.json")
.then(r=>r.json())
.then(d=>{
    games=d;
    render(games);
});

/* STARS */
const bg=document.getElementById("bg");
const stars=[];

for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    bg.appendChild(s);
    stars.push(s);
}

document.addEventListener("mousemove",(e)=>{
    let x=(e.clientX/window.innerWidth-0.5)*20;
    let y=(e.clientY/window.innerHeight-0.5)*20;

    stars.forEach((s,i)=>{
        s.style.transform=`translate(${x*(i%3)}px,${y*(i%3)}px)`;
    });
});
</script>

</body>
</html>
