<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>❄️ Milo's Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Inter", sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
    background: radial-gradient(circle at top, #111827, #05070f);
    color: white;
}

/* ⭐ CONSTELLATION */
canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

canvas.hidden {
    opacity: 0;
}

/* UI */
.sidebar, .main {
    position: relative;
    z-index: 2;
}

.sidebar {
    width: 300px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px);
    border-right: 1px solid rgba(255,255,255,0.1);
}

.title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    background: linear-gradient(90deg, #7c3aed, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.search {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

#gameList {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.game {
    padding: 12px;
    border-radius: 14px;
    cursor: pointer;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s;
}

.game:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.12);
}

.game-title { font-weight: 600; font-size: 14px; }
.tag { font-size: 11px; opacity: 0.7; }

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.bar {
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.btn {
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #7c3aed, #22d3ee);
}

iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: black;
}

.credits {
    font-size: 11px;
    opacity: 0.6;
    text-align: center;
    margin-top: auto;
    padding-top: 10px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="sidebar">
    <div class="title">❄️ Milo's Gaming Hub</div>

    <input class="search" id="search" placeholder="Search games..." />

    <div id="gameList"></div>

    <div class="credits">Made by Milo Builder</div>
</div>

<div class="main">
    <div class="bar">
        <div>✨ Select a game to play</div>
        <button class="btn" onclick="goHome()">Home</button>
    </div>

    <iframe id="frame"></iframe>
</div>

<script>
/* ======================
   🎮 GAME SYSTEM
====================== */

let games = [
    { name: "Snow Rider 3D", url: "https://itsvijaysingh.github.io/Snow-Rider3D/", tag: "Racing" },
    { name: "Run 3", url: "https://lekug.github.io/tn6pS9dCf37xAhkJv/", tag: "Runner" },
    { name: "Veck.io", url: "https://veck.io/", tag: "Multiplayer" },
    { name: "Hole.io", url: "https://holeio.com/", tag: "Arcade" },
    { name: "Granny", url: "https://genizymath.github.io/iframe/90-fix2.html", tag: "Horror" },
    { name: "Paper.io 2", url: "https://paperio.site/", tag: "Multiplayer" },
    { name: "Agar.io (Broken)", url: "https://agar.io/#ffa", tag: "Multiplayer" },
    { name: "Gulper.io", url: "https://gulper.io/", tag: "Multiplayer" },
    { name: "Basket Bros", url: "https://basketbros.io/", tag: "Sports" },
    { name: "Rocket Goal", url: "https://rocketgoal.io/", tag: "Sports" },
    { name: "Open Front", url: "https://openfront.io/", tag: "War" },
    { name: "Minecraft", url: "https://eaglercraft.com/play/?version=1.8.8", tag: "Arcade" }
];

const list = document.getElementById("gameList");
const frame = document.getElementById("frame");
const search = document.getElementById("search");
const canvas = document.getElementById("stars");

function renderGames(filter = "") {
    list.innerHTML = "";

    games
    .filter(g => g.name.toLowerCase().includes(filter.toLowerCase()))
    .forEach(game => {
        const div = document.createElement("div");
        div.className = "game";
        div.innerHTML = `
            <div class="game-title">${game.name}</div>
            <div class="tag">${game.tag}</div>
        `;
        div.onclick = () => loadGame(game.url);
        list.appendChild(div);
    });
}

function goHome() {
    frame.src = "";
    canvas.classList.remove("hidden");
}

function loadGame(url) {
    frame.src = url;
    canvas.classList.add("hidden");
}

search.addEventListener("input", e => renderGames(e.target.value));
renderGames();

/* ======================
   🌌 CONSTELLATION
====================== */

const ctx = canvas.getContext("2d");
let w, h;
let particles = [];
const mouse = { x: null, y: null };

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("mousemove", e => {
    mouse.x = e.x;
    mouse.y = e.y;
});

class Particle {
    constructor() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.size = 2;
    }

    move() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;

        if (mouse.x && mouse.y) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 160) {
                this.x += dx * 0.02;
                this.y += dy * 0.02;
            }
        }
    }

    draw() {
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#7c3aed";

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
    }
}

function init() {
    particles = [];
    for (let i = 0; i < 80; i++) {
        particles.push(new Particle());
    }
}

function connect() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 140) {
                ctx.strokeStyle = `rgba(34,211,238,${1 - dist/140})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, w, h);

    particles.forEach(p => {
        p.move();
        p.draw();
    });

    connect();
    requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
