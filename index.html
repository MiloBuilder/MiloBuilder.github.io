<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galactic Games</title>

<style>
:root{
    --bg:#05060a;
    --panel: rgba(255,255,255,0.06);
    --text:#eaeaea;
    --muted:#9aa0aa;
    --accent:#8b5cf6;
    --accent2:#22d3ee;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: ui-sans-serif, system-ui;
    background: var(--bg);
    color: var(--text);
    height:100vh;
    overflow:hidden;
}

/* =========================
   🎲 CUBE BACKGROUND
========================= */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(139,92,246,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(34,211,238,0.12), transparent 40%),
        linear-gradient(120deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    animation: moveBG 20s linear infinite;
    pointer-events:none;
    opacity:0.8;
}

@keyframes moveBG{
    from{transform:translateY(0);}
    to{transform:translateY(-80px);}
}

/* =========================
   HEADER
========================= */
header{
    text-align:center;
    padding:30px 20px 10px;
}

h1{
    font-size:3rem;
    background: linear-gradient(90deg, #fff, var(--accent), var(--accent2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:var(--muted);
    margin-top:6px;
}

/* =========================
   CONTROLS (A-Z STILL HERE)
========================= */
.controls{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:18px;
}

#search{
    padding:12px 16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(0,0,0,0.4);
    color:white;
    width:260px;
    outline:none;
    backdrop-filter: blur(10px);
}

.sort-btn{
    padding:12px 16px;
    border-radius:999px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    backdrop-filter: blur(10px);
}

/* =========================
   GRID
========================= */
.grid{
    height:calc(100vh - 150px);
    overflow-y:auto;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap:35px;
    padding:50px 60px;
    max-width:1200px;
    margin:0 auto;
}

/* =========================
   GAME CARD (CUBE STYLE)
========================= */
.card{
    aspect-ratio:1/1;
    border-radius:18px;
    overflow:hidden;
    position:relative;
    cursor:pointer;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);

    transition:0.25s ease;

    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

.card:hover{
    transform:translateY(-8px) scale(1.05);
    box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter: brightness(0.9);
}

.title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:10px;
    font-size:0.85rem;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* =========================
   GAME OVERLAY (MODERN GLASS UI)
========================= */
#gameOverlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
}

.window{
    width:95%;
    height:92%;
    background:rgba(15,15,25,0.9);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 60px rgba(0,0,0,0.8);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:rgba(255,255,255,0.05);
}

.gameTitle{
    color:#ddd;
}

.btns button{
    background:rgba(255,255,255,0.1);
    border:none;
    color:white;
    padding:6px 10px;
    margin-left:8px;
    border-radius:8px;
    cursor:pointer;
}

.btns button:hover{
    background:rgba(255,255,255,0.2);
}

iframe{
    flex:1;
    width:100%;
    border:none;
}
</style>
</head>

<body>

<header>
    <h1>Galactic Games</h1>
    <div class="subtitle">A futuristic game launcher</div>

    <div class="controls">
        <input id="search" placeholder="Search games..." />
        <button class="sort-btn" id="sortBtn" onclick="toggleSort()">A-Z</button>
    </div>
</header>

<div class="grid" id="grid"></div>

<!-- GAME OVERLAY -->
<div id="gameOverlay">
    <div class="window">

        <div class="topbar">
            <div class="gameTitle" id="gameTitle">Game</div>

            <div class="btns">
                <button onclick="fullscreen()">⛶</button>
                <button onclick="closeGame()">✕</button>
            </div>
        </div>

        <iframe id="frame"></iframe>
    </div>
</div>

<script>
let games=[];
let sort="asc";

const grid=document.getElementById("grid");
const overlay=document.getElementById("gameOverlay");
const frame=document.getElementById("frame");
const title=document.getElementById("gameTitle");
const btn=document.getElementById("sortBtn");

function render(list){
    grid.innerHTML="";
    list.forEach(g=>{
        const c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <img src="${g.image || 'https://picsum.photos/300/300?random=' + Math.random()}">
            <div class="title">${g.name}</div>
        `;

        c.onclick=()=>openGame(g);
        grid.appendChild(c);
    });
}

function openGame(game){
    frame.src=game.url;
    title.innerText=game.name;
    overlay.style.display="flex";
}

function closeGame(){
    overlay.style.display="none";
    frame.src="";
}

function fullscreen(){
    const el=document.querySelector(".window");
    if(!document.fullscreenElement){
        el.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* SORT */
function toggleSort(){
    sort = sort==="asc" ? "desc" : "asc";
    btn.innerText = sort==="asc" ? "A-Z" : "Z-A";

    games.sort((a,b)=>{
        return sort==="asc"
        ? a.name.localeCompare(b.name)
        : b.name.localeCompare(a.name);
    });

    render(games);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
    const v=e.target.value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

/* LOAD */
fetch("games.json")
.then(r=>r.json())
.then(data=>{
    games=data;
    render(games);
});
</script>

</body>
</html>
