<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galactic's Games</title>

<style>
:root{
    --bg:#05060a;
    --panel: rgba(255,255,255,0.06);
    --text:#eaeaea;
    --muted:#9aa0aa;
    --accent:#8b5cf6;
    --accent2:#22d3ee;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: ui-sans-serif, system-ui;
    background: radial-gradient(circle at top, #0b0d14, var(--bg));
    color:var(--text);
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    text-align:center;
    padding:40px 20px 10px;
    flex-shrink:0;
}

h1{
    font-size:3rem;
    background: linear-gradient(90deg, #fff, var(--accent), var(--accent2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:var(--muted);
    margin-top:6px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:18px;
}

#search{
    padding:12px 16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.08);
    background:var(--panel);
    color:white;
    width:260px;
    outline:none;
}

/* GRID (CLEAN + STABLE) */
.grid{
    flex:1;
    overflow-y:auto;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap:30px;
    padding:60px 50px;
    max-width:1100px;
    margin:0 auto;
    align-content:start;
}

.card{
    width:100%;
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    position:relative;

    background:#111522;
    border:1px solid rgba(255,255,255,0.06);

    transition:0.25s ease;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:10px;
    font-size:0.85rem;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* =========================
   🎮 NEW GAME OVERLAY
========================= */

#gameOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

/* main window */
.gameWindow{
    width:95%;
    height:92%;
    background:#0c0f18;
    border-radius:18px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 50px rgba(0,0,0,0.8);
}

/* top bar */
.gameTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:#151a2a;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.gameTitle{
    font-size:0.95rem;
    color:#ddd;
}

.gameBtns button{
    background:rgba(255,255,255,0.08);
    border:none;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    margin-left:8px;
}

.gameBtns button:hover{
    background:rgba(255,255,255,0.2);
}

/* iframe area */
iframe{
    flex:1;
    width:100%;
    border:none;
}
</style>
</head>

<body>

<header>
    <h1>Galactic's Games</h1>
    <div class="subtitle">Made by Galactic_Z</div>

    <div class="controls">
        <input id="search" placeholder="Search games..." />
    </div>
</header>

<div class="grid" id="grid"></div>

<!-- 🎮 NEW OVERLAY -->
<div id="gameOverlay">
    <div class="gameWindow">

        <div class="gameTop">
            <div class="gameTitle" id="gameTitle">Game</div>

            <div class="gameBtns">
                <button onclick="fullscreen()">⛶</button>
                <button onclick="closeGame()">✕</button>
            </div>
        </div>

        <iframe id="frame"></iframe>
    </div>
</div>

<script>
let games=[];

const grid=document.getElementById("grid");
const overlay=document.getElementById("gameOverlay");
const frame=document.getElementById("frame");
const title=document.getElementById("gameTitle");

function render(list){
    grid.innerHTML="";
    list.forEach(g=>{
        const c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <img src="${g.image || 'https://picsum.photos/300/300?random=' + Math.random()}">
            <div class="title">${g.name}</div>
        `;

        c.onclick=()=>openGame(g);
        grid.appendChild(c);
    });
}

function openGame(game){
    frame.src=game.url;
    title.innerText=game.name;
    overlay.style.display="flex";
}

function closeGame(){
    overlay.style.display="none";
    frame.src="";
}

function fullscreen(){
    const el=document.querySelector(".gameWindow");
    if(!document.fullscreenElement){
        el.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* search */
document.getElementById("search").addEventListener("input",e=>{
    const v=e.target.value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

/* load json */
fetch("games.json")
.then(r=>r.json())
.then(data=>{
    games=data;
    render(games);
});
</script>

</body>
</html>
