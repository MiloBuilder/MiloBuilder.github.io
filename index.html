<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>❄️ Milo's Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Inter", sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
    background: radial-gradient(circle at top, #111827, #05070f);
    color: white;
}

html { scroll-behavior: smooth; }

/* 🌌 CONSTELLATION */
canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}
canvas.hidden { opacity: 0; }

/* SIDEBAR */
.sidebar {
    width: 300px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.1);
}

.title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    background: linear-gradient(90deg, #7c3aed, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.search {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

/* SCROLLBAR */
#gameList {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 5px;
}
#gameList::-webkit-scrollbar { width: 8px; }
#gameList::-webkit-scrollbar-thumb {
    background: linear-gradient(#7c3aed, #22d3ee);
    border-radius: 10px;
}
#gameList { scrollbar-width: thin; scrollbar-color: #7c3aed transparent; }

/* GAME */
.game {
    padding: 12px;
    border-radius: 14px;
    cursor: pointer;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.25s;
}
.game:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.12);
}

.game-title { font-weight: 600; font-size: 14px; }
.tag { font-size: 11px; opacity: 0.7; }

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.bar {
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.btn {
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #7c3aed, #22d3ee);
}

iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: black;
}

.homeMsg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    opacity: 0.6;
}

.credits {
    font-size: 11px;
    opacity: 0.6;
    text-align: center;
    margin-top: auto;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="sidebar">
    <div class="title">❄️ Milo's Gaming Hub</div>
    <input class="search" id="search" placeholder="Search games..." />
    <div id="gameList"></div>
    <div class="credits">Made by Milo Builder</div>
</div>

<div class="main">
    <div class="bar">
        <div>✨ Select a game to play</div>
        <button class="btn" onclick="goHome()">Home</button>
    </div>

    <div class="homeMsg" id="homeMsg">🌌 Move your mouse...</div>
    <iframe id="frame"></iframe>
</div>

<script>
let games = [
    { name: "Snow Rider 3D", url: "https://itsvijaysingh.github.io/Snow-Rider3D/", tag: "Racing" },
    { name: "Run 3", url: "https://lekug.github.io/tn6pS9dCf37xAhkJv/", tag: "Runner" },
    { name: "Veck.io", url: "https://veck.io/", tag: "Multiplayer" },
    { name: "Hole.io", url: "https://holeio.com/", tag: "Arcade" },
    { name: "Granny", url: "https://genizymath.github.io/iframe/90-fix2.html", tag: "Horror" },
    { name: "Paper.io 2", url: "https://paperio.site/", tag: "Multiplayer" },
    { name: "Agar.io", url: "https://agar.io/#ffa", tag: "Multiplayer" },
    { name: "Gulper.io", url: "https://gulper.io/", tag: "Multiplayer" },
    { name: "Basket Bros", url: "https://basketbros.io/", tag: "Sports" },
    { name: "Rocket Goal", url: "https://rocketgoal.io/", tag: "Sports" },
    { name: "Open Front", url: "https://openfront.io/", tag: "War" },
    { name: "Minecraft", url: "https://eaglercraft.com/play/?version=1.8.8", tag: "Sandbox" },
    { name: "Capybara Clicker", url: "https://capybara-clicker.com/", tag: "Clicker" },
    { name: "Infinite Craft", url: "https://neal.fun/infinite-craft/", tag: "Arcade" },
    { name: "Neal.fun", url: "https://neal.fun/", tag: "Arcade" }
];

const list = document.getElementById("gameList");
const frame = document.getElementById("frame");
const search = document.getElementById("search");
const canvas = document.getElementById("stars");
const homeMsg = document.getElementById("homeMsg");

function renderGames(filter = "") {
    list.innerHTML = "";
    games
        .filter(g => g.name.toLowerCase().includes(filter.toLowerCase()))
        .forEach(game => {
            const div = document.createElement("div");
            div.className = "game";
            div.innerHTML = `<div class="game-title">${game.name}</div><div class="tag">${game.tag}</div>`;
            div.onclick = () => loadGame(game.url);
            list.appendChild(div);
        });
}

function goHome() {
    frame.src = "";
    canvas.classList.remove("hidden");
    homeMsg.style.display = "block";
}

function loadGame(url) {
    frame.src = url;
    canvas.classList.add("hidden");
    homeMsg.style.display = "none";
}

search.addEventListener("input", e => renderGames(e.target.value));
renderGames();

/* 🌌 CONSTELLATION */
const ctx = canvas.getContext("2d");
let w, h;
let particles = [];
const mouse = { x: null, y: null };

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("mousemove", e => {
    mouse.x = e.x;
    mouse.y = e.y;
});

class Particle {
    constructor() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.size = 2;
    }
    move() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;

        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
            this.x += dx * 0.02;
            this.y += dy * 0.02;
        }
    }
    draw() {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    particles = [];
    for (let i = 0; i < 80; i++) particles.push(new Particle());
}

function connect() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 130) {
                ctx.strokeStyle = `rgba(124,58,237,${1 - dist/130})`;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.move(); p.draw(); });
    connect();
    requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
