<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galactic's Games</title>

<style>
:root{
    --bg:#05060a;
    --panel: rgba(255,255,255,0.06);
    --text:#eaeaea;
    --muted:#9aa0aa;
    --accent:#8b5cf6;
    --accent2:#22d3ee;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: ui-sans-serif, system-ui;
    background: radial-gradient(circle at top, #0b0d14, var(--bg));
    color:var(--text);
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:60px 60px;
    opacity:0.2;
    pointer-events:none;
}

header{
    text-align:center;
    padding:40px 20px 10px;
    flex-shrink:0;
}

h1{
    font-size:3rem;
    background: linear-gradient(90deg, #fff, var(--accent), var(--accent2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:var(--muted);
    margin-top:6px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
}

#search{
    padding:12px 16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.08);
    background:var(--panel);
    color:white;
    width:260px;
    outline:none;
}

.sort{
    position:relative;
}

.sort-btn{
    padding:12px 16px;
    border-radius:999px;
    border:none;
    background:var(--panel);
    color:white;
    cursor:pointer;
}

.sort-menu{
    position:absolute;
    top:120%;
    left:0;
    width:120px;
    background:#0f1118;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    overflow:hidden;
    opacity:0;
    transform:translateY(-8px);
    pointer-events:none;
    transition:0.2s ease;
    z-index:10;
}

.sort-menu.active{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
}

.sort-menu button{
    width:100%;
    padding:10px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

.sort-menu button:hover{
    background:rgba(255,255,255,0.08);
}

/* 🎮 GRID (REAL FIX) */
.grid{
    flex:1;
    min-height:0;
    display:grid;

    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));

    /* real separation */
    gap:55px;

    /* breathing room so rows don't feel stacked */
    padding:90px 60px 140px;

    max-width:1100px;
    margin:0 auto;

    overflow-y:auto;

    align-content:start;
    justify-content:center;

    row-gap:80px;
}

/* 🎮 CARD (FIX FOR “FUSING LOOK”) */
.card{
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    position:relative;
    cursor:pointer;

    background:var(--panel);
    border:1px solid rgba(255,255,255,0.06);

    transition:0.25s ease;

    /* IMPORTANT: prevents visual blending */
    contain: paint;
    will-change: transform;

    box-shadow: 0 10px 28px rgba(0,0,0,0.5);
}

.card:hover{
    transform:translateY(-6px) scale(1.03);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:10px;
    font-size:0.85rem;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* 🎮 GAME VIEW */
#gameFrame{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
}

#gameFrame.active{display:flex;}

.game-ui{
    width:96%;
    height:96%;
    display:flex;
    flex-direction:column;
    border-radius:16px;
    overflow:hidden;
    background:#0b0d14;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    background:linear-gradient(90deg, #111, #1a1d2a);
    border-bottom:1px solid rgba(255,255,255,0.05);
}

#gameTitle{
    font-size:0.9rem;
    color:#ccc;
}

.actions button{
    background:rgba(255,255,255,0.08);
    border:none;
    color:white;
    margin-left:8px;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

.actions button:hover{
    background:rgba(255,255,255,0.2);
}

iframe{
    flex:1;
    width:100%;
    border:none;
}
</style>
</head>

<body>

<header>
    <h1>Galactic's Games</h1>
    <div class="subtitle">Made by Galactic_Z</div>

    <div class="controls">
        <input id="search" placeholder="Search games..." />

        <div class="sort">
            <button class="sort-btn" id="sortBtn" onclick="toggleMenu()">A-Z</button>
            <div class="sort-menu" id="menu">
                <button onclick="setSort('asc')">A-Z</button>
                <button onclick="setSort('desc')">Z-A</button>
            </div>
        </div>
    </div>
</header>

<div class="grid" id="grid"></div>

<div id="gameFrame">
    <div class="game-ui">

        <div class="topbar">
            <span id="gameTitle">Game</span>
            <div class="actions">
                <button onclick="toggleFullscreen()">⛶</button>
                <button onclick="closeGame()">✕</button>
            </div>
        </div>

        <iframe id="frame"></iframe>

    </div>
</div>

<script>
let sortMode="asc";
let games=[];

const grid=document.getElementById("grid");
const frame=document.getElementById("frame");
const gameFrame=document.getElementById("gameFrame");
const menu=document.getElementById("menu");
const btn=document.getElementById("sortBtn");

function toggleMenu(){menu.classList.toggle("active");}

function setSort(mode){
    sortMode=mode;
    btn.innerText = mode==='asc' ? 'A-Z' : 'Z-A';
    menu.classList.remove("active");
    render(games);
}

function sortGames(list){
    return [...list].sort((a,b)=>
        sortMode==='asc'
        ? a.name.localeCompare(b.name)
        : b.name.localeCompare(a.name)
    );
}

function render(list){
    grid.innerHTML="";
    sortGames(list).forEach(g=>{
        const c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <img src="${g.image || 'https://picsum.photos/300/300?random=' + Math.random()}">
            <div class='title'>${g.name}</div>
        `;

        c.onclick=()=>openGame(g);
        grid.appendChild(c);
    });
}

function openGame(game){
    frame.src=game.url;
    document.getElementById("gameTitle").innerText=game.name;
    gameFrame.classList.add("active");
}

function closeGame(){
    gameFrame.classList.remove("active");
    frame.src="";
}

function toggleFullscreen(){
    const el=document.querySelector(".game-ui");
    if(!document.fullscreenElement){
        el.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

document.getElementById("search").addEventListener("input",e=>{
    const v=e.target.value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

fetch("games.json")
.then(res=>res.json())
.then(data=>{
    games=data;
    render(games);
});
</script>

</body>
</html>
