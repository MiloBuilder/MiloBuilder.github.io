<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galactic Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    color:white;
    height:100vh;
    overflow:hidden;
}

/* 🔐 LOGIN SCREEN */
#loginScreen{
    position:fixed;
    inset:0;
    background:#05060a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loginBox{
    background:#0c0f18;
    padding:30px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 0 40px rgba(139,92,246,0.3);
}

.loginBox h2{
    margin-bottom:10px;
}

.loginBox input{
    padding:12px;
    width:220px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
}

.loginBox button{
    margin-top:12px;
}

#errorMsg{
    color:#ff4d4d;
    margin-top:8px;
}

/* ⭐ STAR BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    transition:transform 0.15s ease;
}

/* HEADER */
header{
    text-align:center;
    padding:30px;
}

h1{
    font-size:3rem;
    background: linear-gradient(90deg,#fff,#8b5cf6,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#aaa;
    margin-top:6px;
}

/* CONTROLS */
.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

#search{
    padding:12px 16px;
    border-radius:999px;
    border:none;
    width:250px;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

button{
    padding:12px 16px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.1);
    color:white;
}

/* GRID */
.grid{
    height:calc(100vh - 160px);
    overflow-y:auto;
    display:grid;
    grid-template-columns: repeat(auto-fill, 160px);
    justify-content:center;
    gap:28px;
    padding:60px;
    align-content:start;
}

.grid::-webkit-scrollbar{
    width:10px;
}

.grid::-webkit-scrollbar-thumb{
    background:#8b5cf6;
    border-radius:10px;
}

/* GAME CARD */
.card{
    width:160px;
    height:160px;
    border-radius:16px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:8px;
    font-size:0.85rem;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.85);
}

.window{
    width:95%;
    height:92%;
    background:#0c0f18;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    background:#151a2a;
}

iframe{
    flex:1;
    width:100%;
    border:none;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
    <div class="loginBox">
        <h2>Enter Password</h2>
        <input type="password" id="passwordInput" placeholder="Password">
        <br>
        <button onclick="checkPassword()">Enter</button>
        <p id="errorMsg"></p>
    </div>
</div>

<div id="bg"></div>

<header>
    <h1>Galactic Games</h1>
    <div class="subtitle">Launcher</div>

    <div class="controls">
        <input id="search" placeholder="Search games..." />
        <button id="sortBtn" onclick="toggleSort()">A-Z</button>
    </div>
</header>

<div class="grid" id="grid"></div>

<div id="overlay">
    <div class="window">
        <div class="topbar">
            <div id="title">Game</div>
            <button onclick="closeGame()">✕</button>
        </div>
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
/* 🔐 PASSWORD */
const correctPassword = "FreeJonh";

function checkPassword(){
    const input = document.getElementById("passwordInput").value;

    if(input === correctPassword){
        document.getElementById("loginScreen").style.display = "none";
    } else {
        document.getElementById("errorMsg").innerText = "Wrong password!";
    }
}

/* ENTER KEY SUPPORT */
document.getElementById("passwordInput").addEventListener("keydown", e=>{
    if(e.key === "Enter") checkPassword();
});

let games=[];
let sort="asc";

const grid=document.getElementById("grid");
const overlay=document.getElementById("overlay");
const frame=document.getElementById("frame");
const title=document.getElementById("title");

/* ⭐ STARS */
const bg=document.getElementById("bg");
const stars=[];

for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    bg.appendChild(s);
    stars.push(s);
}

document.addEventListener("mousemove",(e)=>{
    let x=(e.clientX/window.innerWidth - 0.5)*20;
    let y=(e.clientY/window.innerHeight - 0.5)*20;

    stars.forEach((s,i)=>{
        s.style.transform=`translate(${x*(i%3)}px, ${y*(i%3)}px)`;
    });
});

/* RENDER */
function render(list){
    grid.innerHTML="";
    list.forEach(g=>{
        let c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <img src="${g.image || 'https://picsum.photos/300?random='+Math.random()}">
            <div class="title">${g.name}</div>
        `;

        c.onclick=()=>openGame(g);
        grid.appendChild(c);
    });
}

/* OPEN */
function openGame(g){
    frame.src=g.url;
    title.innerText=g.name;
    overlay.style.display="flex";
}

function closeGame(){
    overlay.style.display="none";
    frame.src="";
}

/* SORT */
function toggleSort(){
    sort = sort === "asc" ? "desc" : "asc";
    document.getElementById("sortBtn").innerText = sort === "asc" ? "A-Z" : "Z-A";

    games.sort((a,b)=>{
        return sort === "asc"
        ? a.name.localeCompare(b.name)
        : b.name.localeCompare(a.name);
    });

    render(games);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
    let v=e.target.value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

/* LOAD */
fetch("games.json")
.then(r=>r.json())
.then(d=>{
    games=d;
    render(games);
});
</script>

</body>
</html>
