<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Hub</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f1a;
        color: white;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* LEFT SIDEBAR */
    .sidebar {
        width: 280px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        padding: 15px;
        overflow-y: auto;
        border-right: 1px solid rgba(255,255,255,0.1);
    }

    .title {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 15px;
        text-align: center;
    }

    .game {
        padding: 10px;
        margin-bottom: 10px;
        background: rgba(255,255,255,0.08);
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        text-align: center;
    }

    .game:hover {
        background: rgba(255,255,255,0.15);
        transform: scale(1.03);
    }

    /* MAIN VIEW */
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .bar {
        padding: 10px;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .btn {
        background: #6c5ce7;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        color: white;
        cursor: pointer;
    }

    .btn:hover {
        background: #8c7ae6;
    }

    iframe {
        flex: 1;
        width: 100%;
        border: none;
        background: black;
    }

    .hint {
        font-size: 12px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="sidebar">
    <div class="title">🎮 Game Hub</div>
    <div id="gameList"></div>
</div>

<div class="main">
    <div class="bar">
        <div class="hint">Click a game to load it here</div>
        <button class="btn" onclick="goHome()">Home</button>
    </div>

    <iframe id="frame" src=""></iframe>
</div>

<script>
/* 🔥 PUT YOUR GAMES HERE */
const games = [
    { name: "Snow Rider 3D", url: "https://itsvijaysingh.github.io/Snow-Rider3D/" },
    { name: "Run 3", url: "https://lekug.github.io/tn6pS9dCf37xAhkJv/" },
    { name: "Cookie Clicker", url: "https://orteil.dashnet.org/cookieclicker/" }
];

const list = document.getElementById("gameList");
const frame = document.getElementById("frame");

function loadGame(url) {
    frame.src = url;
}

function goHome() {
    frame.src = "";
}

games.forEach(game => {
    const div = document.createElement("div");
    div.className = "game";
    div.innerText = game.name;
    div.onclick = () => loadGame(game.url);
    list.appendChild(div);
});
</script>

</body>
</html>
