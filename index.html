<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galactic Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: ui-sans-serif, system-ui;
    background:#05060a;
    overflow:hidden;
    color:white;
}

/* ⭐ STAR BACKGROUND (MOUSE FOLLOW) */
#bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
    background:radial-gradient(circle at center, #0b0d14, #05060a);
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    transition:transform 0.1s linear;
}

/* HEADER */
header{
    text-align:center;
    padding:30px;
}

h1{
    font-size:3rem;
    background: linear-gradient(90deg,#fff,#8b5cf6,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#aaa;
    margin-top:6px;
}

/* CONTROLS */
.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

#search{
    padding:12px 16px;
    border-radius:999px;
    border:none;
    width:250px;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

button{
    padding:12px 16px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.1);
    color:white;
}

/* 🎮 GRID (CLEAN - NO FUSING POSSIBLE) */
.grid{
    height:calc(100vh - 150px);
    overflow-y:auto;

    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap:28px;

    padding:50px;
    max-width:1100px;
    margin:auto;
}

/* SCROLLBAR (PURPLE) */
.grid::-webkit-scrollbar{
    width:10px;
}

.grid::-webkit-scrollbar-track{
    background:#0b0d14;
}

.grid::-webkit-scrollbar-thumb{
    background:linear-gradient(#8b5cf6,#22d3ee);
    border-radius:10px;
}

/* CARDS */
.card{
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    position:relative;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);

    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:8px;
    font-size:0.85rem;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(10px);
}

.window{
    width:95%;
    height:92%;
    background:#0c0f18;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    background:#151a2a;
}

iframe{
    flex:1;
    width:100%;
    border:none;
}
</style>
</head>

<body>

<div id="bg"></div>

<header>
    <h1>Galactic Games</h1>
    <div class="subtitle">Launcher</div>

    <div class="controls">
        <input id="search" placeholder="Search games..." />
        <button id="sortBtn" onclick="toggleSort()">A-Z</button>
    </div>
</header>

<div class="grid" id="grid"></div>

<div id="overlay">
    <div class="window">

        <div class="topbar">
            <div id="title">Game</div>
            <button onclick="closeGame()">✕</button>
        </div>

        <iframe id="frame"></iframe>
    </div>
</div>

<script>
let games=[];
let sort="asc";

const grid=document.getElementById("grid");
const overlay=document.getElementById("overlay");
const frame=document.getElementById("frame");
const title=document.getElementById("title");

/* ⭐ STARS */
const stars=[];
const bg=document.getElementById("bg");

for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    bg.appendChild(s);
    stars.push(s);
}

/* ⭐ MOUSE MOVE EFFECT */
document.addEventListener("mousemove",(e)=>{
    let x=(e.clientX/window.innerWidth - 0.5)*20;
    let y=(e.clientY/window.innerHeight - 0.5)*20;

    stars.forEach((s,i)=>{
        s.style.transform=`translate(${x*(i%5)}px, ${y*(i%5)}px)`;
    });
});

/* RENDER */
function render(list){
    grid.innerHTML="";
    list.forEach(g=>{
        let c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <img src="${g.image || 'https://picsum.photos/300?random='+Math.random()}">
            <div class="title">${g.name}</div>
        `;

        c.onclick=()=>openGame(g);
        grid.appendChild(c);
    });
}

/* OPEN */
function openGame(g){
    frame.src=g.url;
    title.innerText=g.name;
    overlay.style.display="flex";
}

function closeGame(){
    overlay.style.display="none";
    frame.src="";
}

/* SORT A-Z */
function toggleSort(){
    sort = sort==="asc" ? "desc" : "asc";
    document.getElementById("sortBtn").innerText = sort==="asc" ? "A-Z" : "Z-A";

    games.sort((a,b)=>{
        return sort==="asc"
        ? a.name.localeCompare(b.name)
        : b.name.localeCompare(a.name);
    });

    render(games);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
    let v=e.target.value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

/* LOAD */
fetch("games.json")
.then(r=>r.json())
.then(d=>{
    games=d;
    render(games);
});
</script>

</body>
</html>
