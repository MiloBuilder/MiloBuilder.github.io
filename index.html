<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galactic Games</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:ui-sans-serif,system-ui;
    background:#05060a;
    color:white;
    overflow:hidden;
}

/* BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.5;
}

/* HEADER */
header{
    text-align:center;
    padding:30px 20px;
}

h1{
    font-size:2.8rem;
    background:linear-gradient(90deg,#fff,#8b5cf6,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.controls{
    margin-top:15px;
}

#search{
    padding:12px 16px;
    width:260px;
    border-radius:999px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

/* GRID */
.grid{
    height:calc(100vh - 140px);
    overflow-y:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,160px);
    justify-content:center;
    gap:24px;
    padding:40px;
}

/* CARD */
.card{
    width:160px;
    height:160px;
    border-radius:16px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px) scale(1.04);
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:8px;
    font-size:0.85rem;
    background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

/* FAVORITE */
.fav{
    position:absolute;
    top:8px;
    right:8px;
    font-size:18px;
    cursor:pointer;
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
}

.window{
    width:95%;
    height:92%;
    background:#0c0f18;
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    background:#151a2a;
}

iframe{
    flex:1;
    width:100%;
    border:none;
}
</style>
</head>

<body>

<div id="bg"></div>

<header>
    <h1>Galactic Games</h1>

    <div class="controls">
        <input id="search" placeholder="Search games...">
    </div>
</header>

<div class="grid" id="grid"></div>

<div id="overlay">
    <div class="window">
        <div class="topbar">
            <div id="title">Game</div>
            <button onclick="closeGame()">✕</button>
        </div>
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
let games=[];

const grid=document.getElementById("grid");
const overlay=document.getElementById("overlay");
const frame=document.getElementById("frame");
const title=document.getElementById("title");

/* FAVORITES */
function getFavs(){
    return JSON.parse(localStorage.getItem("favs"))||[];
}

function saveFavs(f){
    localStorage.setItem("favs",JSON.stringify(f));
}

function toggleFav(e,name){
    e.stopPropagation();

    let favs=getFavs();

    if(favs.includes(name)){
        favs=favs.filter(f=>f!==name);
    } else {
        favs.push(name);
    }

    saveFavs(favs);
    render(games);
}

/* RENDER */
function render(list){
    grid.innerHTML="";
    let favs=getFavs();

    list.forEach(g=>{
        let c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <img src="${g.image || 'https://picsum.photos/300?random='+Math.random()}">
            <div class="title">${g.name}</div>
            <div class="fav">${favs.includes(g.name)?"⭐":"☆"}</div>
        `;

        c.onclick=()=>openGame(g);
        c.querySelector(".fav").onclick=(e)=>toggleFav(e,g.name);

        grid.appendChild(c);
    });
}

/* GAME */
function openGame(g){
    frame.src=g.url;
    title.innerText=g.name;
    overlay.style.display="flex";
}

function closeGame(){
    overlay.style.display="none";
    frame.src="";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
    let v=e.target.value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

/* LOAD GAMES.JSON */
fetch("games.json")
.then(r=>r.json())
.then(d=>{
    games=d;
    render(games);
});

/* STARS */
const bg=document.getElementById("bg");

for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    bg.appendChild(s);
}
</script>

</body>
</html>
