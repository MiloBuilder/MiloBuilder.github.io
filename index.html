<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Launcher</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
        color: #fff;
    }

    header {
        padding: 20px;
        text-align: center;
        font-size: 26px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    .add-box {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    input {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #6c5ce7;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #8c7ae6;
        transform: scale(1.05);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition: 0.2s;
    }

    .card:hover {
        transform: translateY(-5px);
        background: rgba(255,255,255,0.12);
    }

    .card-title {
        font-weight: bold;
        word-break: break-word;
    }

    .card button {
        width: 100%;
    }

    .delete {
        background: #e74c3c;
    }

    .delete:hover {
        background: #ff6b6b;
    }
</style>
</head>

<body>

<header>🎮 My Game Launcher</header>

<div class="container">

    <div class="add-box">
        <input id="name" placeholder="Game name..." />
        <input id="url" placeholder="Game link (https://...)" />
        <button onclick="addGame()">Add</button>
    </div>

    <div class="grid" id="gameGrid"></div>

</div>

<script>
let games = JSON.parse(localStorage.getItem("games")) || [];

function save() {
    localStorage.setItem("games", JSON.stringify(games));
}

function addGame() {
    const name = document.getElementById("name").value.trim();
    const url = document.getElementById("url").value.trim();

    if (!name || !url) return;

    games.push({ name, url });
    save();
    render();

    document.getElementById("name").value = "";
    document.getElementById("url").value = "";
}

function openGame(url) {
    window.open(url, "_blank");
}

function deleteGame(index) {
    games.splice(index, 1);
    save();
    render();
}

function render() {
    const grid = document.getElementById("gameGrid");
    grid.innerHTML = "";

    games.forEach((game, index) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="card-title">${game.name}</div>
            <button onclick="openGame('${game.url}')">Play</button>
            <button class="delete" onclick="deleteGame(${index})">Delete</button>
        `;

        grid.appendChild(card);
    });
}

render();
</script>

</body>
</html>
