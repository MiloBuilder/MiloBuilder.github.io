<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galactic Games</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:ui-sans-serif,system-ui;
    background:#05060a;
    color:white;
    height:100vh;
    overflow:hidden;
}

/* AUTH */
#authScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#05060a;
    z-index:9999;
}

.authBox{
    background:rgba(12,15,24,0.85);
    padding:40px;
    border-radius:20px;
    text-align:center;
    backdrop-filter:blur(20px);
    width:280px;
    box-shadow:0 0 40px rgba(139,92,246,0.2);
}

.authBox input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
}

.authButtons{
    display:flex;
    gap:10px;
}

#authMsg{margin-top:10px;color:#f87171;}

/* BG */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
}

/* HEADER */
header{
    text-align:center;
    padding:30px;
}

h1{
    font-size:3rem;
    background:linear-gradient(90deg,#fff,#8b5cf6,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* CONTROLS */
.controls{
    display:flex;
    justify-content:center;
    gap:10px;
}

input{
    padding:12px;
    border-radius:999px;
    border:none;
}

/* GRID */
.grid{
    height:calc(100vh - 140px);
    overflow-y:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,160px);
    justify-content:center;
    gap:25px;
    padding:40px;
}

/* CARD */
.card{
    width:160px;
    height:160px;
    border-radius:18px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    background:rgba(255,255,255,0.05);
    transition:0.25s;
}

.card:hover{
    transform:translateY(-6px) scale(1.04);
    box-shadow:0 0 20px rgba(139,92,246,0.5);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:8px;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* FAVORITE */
.fav{
    position:absolute;
    top:8px;
    right:8px;
    cursor:pointer;
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.85);
}

.window{
    width:95%;
    height:92%;
    background:#0c0f18;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px;
}

iframe{
    flex:1;
    width:100%;
    border:none;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen">
    <div class="authBox">
        <h2>Galactic Account</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <div class="authButtons">
            <button onclick="signup()">Sign Up</button>
            <button onclick="login()">Log In</button>
        </div>

        <p id="authMsg"></p>
    </div>
</div>

<div id="bg"></div>

<header>
    <h1>Galactic Games</h1>

    <div class="controls">
        <input id="search" placeholder="Search games...">
    </div>
</header>

<div class="grid" id="grid"></div>

<div id="overlay">
    <div class="window">
        <div class="topbar">
            <div id="title">Game</div>
            <button onclick="closeGame()">✕</button>
        </div>
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
/* AUTH */
if(localStorage.getItem("user")){
    document.getElementById("authScreen").style.display="none";
}

function signup(){
    const u=username.value;
    const p=password.value;

    if(!u || !p) return authMsg.innerText="Fill all fields";

    localStorage.setItem("user_"+u,p);
    authMsg.innerText="Account created!";
}

function login(){
    const u=username.value;
    const p=password.value;

    if(localStorage.getItem("user_"+u)===p){
        localStorage.setItem("user",u);
        authScreen.style.display="none";
    } else authMsg.innerText="Wrong login";
}

/* FAVORITES */
function getFavs(){
    return JSON.parse(localStorage.getItem("favs_"+localStorage.getItem("user")))||[];
}

function saveFavs(f){
    localStorage.setItem("favs_"+localStorage.getItem("user"),JSON.stringify(f));
}

function toggleFav(e,name){
    e.stopPropagation();
    let f=getFavs();

    if(f.includes(name)) f=f.filter(x=>x!==name);
    else f.push(name);

    saveFavs(f);
    render(games);
}

/* DATA */
let games=[
    {name:"Game 1",url:"https://example.com"},
    {name:"Game 2",url:"https://example.com"},
    {name:"Game 3",url:"https://example.com"}
];

/* RENDER */
function render(list){
    grid.innerHTML="";
    let favs=getFavs();

    list.forEach(g=>{
        let c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <img src="https://picsum.photos/300?random=${Math.random()}">
            <div class="title">${g.name}</div>
            <div class="fav">${favs.includes(g.name)?"⭐":"☆"}</div>
        `;

        c.onclick=()=>openGame(g);
        c.querySelector(".fav").onclick=(e)=>toggleFav(e,g.name);

        grid.appendChild(c);
    });
}

/* GAME */
function openGame(g){
    frame.src=g.url;
    title.innerText=g.name;
    overlay.style.display="flex";
}

function closeGame(){
    overlay.style.display="none";
    frame.src="";
}

/* SEARCH */
search.addEventListener("input",e=>{
    let v=e.target.value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

/* STARS */
for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    bg.appendChild(s);
}

/* INIT */
render(games);
</script>

</body>
</html>
